function generateCells(w, h, cols, rows) {
const cells = [], cw = w / cols, ch = h / rows, jX = cw * 0.35, jY = ch * 0.35;
const points = [];
for (let r = 0; r < rows; r++)
for (let c = 0; c < cols; c++) {
const cx = c * cw + cw / 2 + rand(-jX, jX);
const cy = r * ch + ch / 2 + rand(-jY, jY);
points.push({ x: Math.max(0, Math.min(w, cx)), y: Math.max(0, Math.min(h, cy)) });
}
points.forEach((pt, idx) => {
const sides = Math.floor(rand(5, 9));
const baseR = Math.min(cw, ch) * rand(0.55, 0.75);
const verts = [];
for (let s = 0; s < sides; s++) {
const a = (s / sides) * Math.PI * 2 + rand(-0.3, 0.3);
const r2 = baseR * rand(0.6, 1.15);
verts.push({ x: pt.x + Math.cos(a) * r2, y: pt.y + Math.sin(a) * r2 });
}
cells.push({
id: idx, cx: pt.x, cy: pt.y,
clipPath: "polygon(" + verts.map(v => `${(v.x / w * 100).toFixed(1)}% ${(v.y / h * 100).toFixed(1)}%`).join(", ") + ")",
});
});
return cells;
}
